name: MediaMTX NVR (DD解耦专版)
version: 1.0.1
slug: mediamtx_dd
description: '配置与数据彻底解耦的极轻量级录像机'
url: "https://github.com/bluenviron/mediamtx"
arch:
  - aarch64
  - amd64
init: false
boot: auto
map:
  - "media:rw"
host_network: true
ports:
  8554/tcp: 8554
  8888/tcp: 8888
  8889/tcp: 8889
  8889/udp: 8889
  9997/tcp: 9997
ports_description:
  8554/tcp: RTSP 端口
  8888/tcp: HLS 网页播放端口
  8889/tcp: WebRTC TCP 端口
  8889/udp: WebRTC UDP 端口
  9997/tcp: API 控制端口
